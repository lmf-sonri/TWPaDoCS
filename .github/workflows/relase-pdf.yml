name: Build PDF for release

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: text.tex

      # Upload PDF to the GitHub Release
      - name: Upload PDF to release
        uses: softprops/action-gh-release@v2
        with:
          files: text.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/deploy-pages@v4

