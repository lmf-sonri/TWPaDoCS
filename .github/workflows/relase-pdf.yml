name: Build PDF for release

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: text.tex

      # Upload PDF to the GitHub Release
      - name: Upload PDF to release
        uses: softprops/action-gh-release@v2
        with:
          files: text.pdf

      # Prepare GitHub Pages site
      - name: Prepare site
        run: |
          mkdir site
          cp text.pdf site/

          cat <<EOF > site/index.html
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <title>Towards Women Professors at DoCS</title>
          </head>
          <body>

          <h1>${{ github.event.repository.name }}</h1>
          <p>Release: ${{ github.event.release.tag_name }}</p>

          <p><a href="text.pdf">Download PDF</a></p>

          <embed src="text.pdf" width="90%" height="1000px" type="application/pdf">

          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/deploy-pages@v4

